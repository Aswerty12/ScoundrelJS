@if (outcome()) {
  <div class="fixed inset-0 z-40 flex items-center justify-center bg-black/45 p-4">
    <article class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
      <p class="text-sm font-semibold uppercase tracking-[0.15em] text-zinc-500">Game Over</p>
      <h2 class="mt-2 text-3xl font-black" [class.text-emerald-700]="outcome()!.kind === 'won'" [class.text-rose-700]="outcome()!.kind === 'lost'">
        {{ outcome()!.kind === 'won' ? 'Victory' : 'Defeat' }}
      </h2>

      <p class="mt-3 text-lg font-bold text-[var(--scoundrel-ink)]">Score: {{ outcome()!.score }}</p>
      <p class="mt-1 text-sm text-zinc-700">{{ outcome()!.scoreBreakdown }}</p>

      <button
        type="button"
        class="mt-5 w-full rounded-lg bg-zinc-900 px-4 py-2.5 text-sm font-bold text-white"
        (click)="restart.emit()"
      >
        Play Again
      </button>
    </article>
  </div>
}
