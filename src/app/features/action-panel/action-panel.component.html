<section class="rounded-2xl border border-black/10 bg-white p-4 shadow-sm">
  <div class="flex flex-wrap items-center gap-2">
    <button
      type="button"
      class="rounded-lg bg-zinc-900 px-3 py-2 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:bg-zinc-300"
      [disabled]="!canRunAway()"
      (click)="runAway.emit('ltr')"
    >
      Run Away (L→R)
    </button>
    <button
      type="button"
      class="rounded-lg bg-zinc-900 px-3 py-2 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:bg-zinc-300"
      [disabled]="!canRunAway()"
      (click)="runAway.emit('rtl')"
    >
      Run Away (R→L)
    </button>
    <button
      type="button"
      class="rounded-lg bg-amber-600 px-3 py-2 text-sm font-semibold text-black disabled:cursor-not-allowed disabled:bg-amber-200"
      [disabled]="!canResetRoom()"
      (click)="resetRoom.emit()"
    >
      Reset Room
    </button>
  </div>

  <p class="mt-3 text-sm text-zinc-700">Turn progress: {{ selectedCount() }}/{{ requiredCount() }}</p>
  @if (isFinalPartialRoom()) {
    <p class="mt-1 text-sm font-semibold text-rose-700">Final partial room: run away is disabled.</p>
  }
  <p class="mt-2 rounded-lg bg-zinc-100 px-3 py-2 text-sm text-zinc-700">{{ message() }}</p>

  @if (forcedBarehandDamage() !== null) {
    <div class="mt-3 rounded-lg border border-rose-200 bg-rose-50 p-3">
      <p class="text-sm text-rose-800">Weapon is locked for this monster. Fight barehanded for {{ forcedBarehandDamage() }} damage?</p>
      <div class="mt-2 flex gap-2">
        <button
          type="button"
          class="rounded bg-rose-700 px-3 py-1.5 text-sm font-semibold text-white"
          (click)="confirmForcedBarehand.emit()"
        >
          Confirm
        </button>
        <button
          type="button"
          class="rounded bg-zinc-200 px-3 py-1.5 text-sm font-semibold text-zinc-700"
          (click)="cancelForcedBarehand.emit()"
        >
          Cancel
        </button>
      </div>
    </div>
  }
</section>
